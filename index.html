<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Canvas Cropper Utility</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="cropper-box">
    <h1>Canvas Image Cropper</h1>
    <div class="workspace">
      <canvas id="cropCanvas"></canvas>
      <div id="selectionBox" class="selection-box"></div>
    </div>
    <div class="panel">
      <button onclick="crop()">Perform Crop</button>
      <button onclick="changeAspect(1)">Square (1:1)</button>
      <button onclick="changeAspect(1.77)">Widescreen (16:9)</button>
    </div>
  </div>
  <script src="cropper.js"></script>
</body>
</html>
